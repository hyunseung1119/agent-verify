name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        run: uv run pytest tests/ --cov=agent_verify --cov-report=term-missing --cov-fail-under=80

  verify:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install agent-verify
        run: uv pip install -e . --system

      - name: Run agent-verify
        run: |
          agent-verify check \
            --diff origin/${{ github.base_ref }} \
            --json-output \
            --fail-on-warn

  verify-action:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run agent-verify (local action)
        id: verify
        uses: ./
        with:
          fail_on_warn: "true"

      - name: Print verification result
        if: always()
        run: |
          echo "Verdict: ${{ steps.verify.outputs.verdict }}"
          echo "Confidence: ${{ steps.verify.outputs.confidence }}"
